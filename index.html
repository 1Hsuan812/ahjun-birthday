<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 阿君生日遊</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: #5a4636;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 15px;
    }

    /* 3秒歡迎開場動畫 */
    #welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 248, 240, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease, transform 0.8s ease;
    }

    .welcome-card {
      background: #ffffff;
      padding: 35px 25px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(217, 119, 127, 0.2);
      border: 3px solid #fce4e4;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 85%;
      width: 340px;
    }

    .witch-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #f29f97;
      box-shadow: 0 8px 20px rgba(200, 90, 84, 0.2);
      margin-bottom: 15px;
      animation: floatImg 2.5s ease-in-out infinite;
    }

    .welcome-card h2 {
      font-size: 1.6rem;
      color: #c85a54;
      margin-bottom: 8px;
    }

    .welcome-card p {
      font-size: 0.95rem;
      color: #8c7361;
    }

    #welcome-screen.hide {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-20px);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes floatImg {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* 頂部列 */
    .top-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: bold;
      color: #d9777f;
      background: rgba(255, 255, 255, 0.8);
      padding: 6px 14px;
      border-radius: 20px;
    }

    .share-btn {
      background: rgba(255, 227, 227, 0.9);
      color: #d9777f;
      border: 1px solid #f2b6b6;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
    }

    /* 首頁主卡片 */
    .home-card {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 253, 247, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 35px 25px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.1);
      text-align: center;
      border: 2px solid #ffffff;
    }

    .header-title {
      margin-bottom: 30px;
    }

    .header-title h1 {
      font-size: 2.2rem;
      color: #c85a54;
      margin-bottom: 8px;
    }

    .header-title p {
      color: #8c7361;
      font-size: 0.95rem;
    }

    /* 首頁主要按鈕區 */
    .home-menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      border: 2px solid #ffd8cc;
      color: #c85a54;
      padding: 16px;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(200, 90, 84, 0.08);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .main-btn:hover {
      transform: translateY(-3px);
      background: #fff8f6;
      border-color: #f29f97;
      box-shadow: 0 8px 20px rgba(200, 90, 84, 0.18);
    }

    /* 景點導航卡片（點擊後展開） */
    #nav-section {
      display: none;
      margin-top: 25px;
      animation: fadeIn 0.4s ease;
    }

    .section-title {
      font-size: 1rem;
      font-weight: bold;
      color: #c85a54;
      margin-bottom: 15px;
      text-align: left;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .nav-item {
      background: #ffffff;
      border: 1.5px solid #ffd8cc;
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      color: #4a3e3d;
      font-weight: bold;
      font-size: 0.88rem;
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      border-color: #f29f97;
      background: #fffafa;
    }

    /* 海報燈箱 (Lightbox) */
    #poster-lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    #poster-lightbox.show {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-content {
      position: relative;
      max-width: 92%;
      max-height: 88vh;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .lightbox-content img {
      width: 100%;
      max-height: 88vh;
      object-fit: contain;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 櫻花花瓣效果 */
    .petal {
      position: fixed;
      top: -10px;
      background: #ffc0cb;
      border-radius: 15px 0 15px 0;
      opacity: 0.7;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 998;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .nav-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- 3秒開場動畫 (含魔女圖) -->
  <div id="welcome-screen">
    <div class="welcome-card">
      <img src="witch.jpg" alt="魔女阿君" class="witch-avatar">
      <h2>阿君生日快樂！</h2>
      <p>✨ 專屬生日旅程準備中... ✨</p>
    </div>
  </div>

  <!-- 頂部列 -->
  <div class="top-bar">
    <div class="brand">🌸 阿君生日遊</div>
    <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href); alert('已複製旅程連結！');">✨ 分享旅程</button>
  </div>

  <!-- 首頁主卡片 -->
  <div class="home-card">
    
    <div class="header-title">
      <h1>🎂 阿君生日遊</h1>
      <p>✨ Happy Birthday & Have a Nice Trip! ✨</p>
    </div>

    <!-- 首頁雙按鈕 -->
    <div class="home-menu">
      <button class="main-btn" onclick="toggleNav()">
        📍 各景點快速導航
      </button>

      <button class="main-btn" onclick="openLightbox()">
        🖼️ 查看手繪海報
      </button>
    </div>

    <!-- 景點導航清單區塊 -->
    <div id="nav-section">
      <div class="section-title">📍 點擊景點開啟 Google 地圖：</div>
      <div class="nav-grid">
        <a class="nav-item" href="https://maps.google.com/?q=RedDot+紅點文旅" target="_blank">🏨 RedDot 紅點文旅</a>
        <a class="nav-item" href="https://maps.google.com/?q=審計新村" target="_blank">📷 審計新村</a>
        <a class="nav-item" href="https://maps.google.com/?q=空也素麵食" target="_blank">🍜 空也素麵食</a>
        <a class="nav-item" href="https://maps.google.com/?q=Tiger+City" target="_blank">🛍️ Tiger City</a>
        <a class="nav-item" href="https://maps.google.com/?q=中華夜市" target="_blank">🌙 中華夜市</a>
        <a class="nav-item" href="https://maps.google.com/?q=國家漫畫博物館" target="_blank">📚 國家漫畫博物館</a>
        <a class="nav-item" href="https://maps.google.com/?q=屋馬燒肉" target="_blank">🥩 涮屋馬</a>
        <a class="nav-item" href="https://maps.google.com/?q=臺中國家歌劇院" target="_blank">🎭 臺中國家歌劇院</a>
      </div>
    </div>

  </div>

  <!-- 海報燈箱彈窗 -->
  <div id="poster-lightbox" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeLightbox()">✕</button>
      <img src="poster.jpg" alt="阿君生日遊手繪海報">
    </div>
  </div>

  <script>
    // 3秒開場動畫
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const welcomeScreen = document.getElementById('welcome-screen');
        if (welcomeScreen) {
          welcomeScreen.classList.add('hide');
        }
      }, 3000);
    });

    // 切換景點清單顯示/隱藏
    function toggleNav() {
      const navSection = document.getElementById('nav-section');
      if (navSection.style.display === 'block') {
        navSection.style.display = 'none';
      } else {
        navSection.style.display = 'block';
        navSection.scrollIntoView({ behavior: 'smooth' });
      }
    }

    // 燈箱控制邏輯
    function openLightbox() {
      document.getElementById('poster-lightbox').classList.add('show');
    }

    function closeLightbox() {
      document.getElementById('poster-lightbox').classList.remove('show');
    }

    // 櫻花花瓣效果
    function createPetal() {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 8 + 8;
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = Math.random() * 3 + 4 + 's';
      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 7000);
    }
    setInterval(createPetal, 400);
  </script>

</body>
</html>
