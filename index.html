<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 阿君生日遊</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: #5a4636;
      /* 換上你喜歡的新背景圖 */
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      padding: 20px 15px;
    }

    /* 頂部導覽 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto 20px auto;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: bold;
      color: #d9777f;
    }

    .share-btn {
      background: #ffe3e3;
      color: #d9777f;
      border: 1px solid #f2b6b6;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
    }

    /* 主容器 */
    .main-card {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 253, 247, 0.88); /* 半透明米白色，襯托背景 */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* 主標題 */
    .header-title {
      text-align: center;
      margin-bottom: 25px;
    }

    .header-title h1 {
      font-size: 2.2rem;
      color: #c85a54;
      margin-bottom: 5px;
    }

    .header-title p {
      color: #8c7361;
      font-size: 0.95rem;
    }

    /* 區塊標題 */
    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #c85a54;
      margin: 25px 0 15px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 景點快速導航按鈕網格 */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }

    .nav-item {
      background: #ffffff;
      border: 2px solid #ffd8cc;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #4a3e3d;
      font-weight: bold;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      transform: translateY(-2px);
      border-color: #f29f97;
      box-shadow: 0 4px 12px rgba(200, 90, 84, 0.15);
    }

    /* 行程打勾清單區塊 */
    .checklist-box {
      border: 2px dashed #f2b6a0;
      border-radius: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.6);
    }

    .day-badge {
      background: #e06d53;
      color: white;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #55433b;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #e06d53;
      cursor: pointer;
    }

    /* 櫻花飄落動畫花瓣 */
    .petal {
      position: fixed;
      top: -10px;
      background: #ffc0cb;
      border-radius: 15px 0 15px 0;
      opacity: 0.7;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 999;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0.2;
      }
    }

    @media (max-width: 600px) {
      .nav-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- 頂部標誌 -->
  <div class="top-bar">
    <div class="brand">🌸 阿君生日遊</div>
    <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href); alert('已複製旅程連結！');">✨ 分享旅程</button>
  </div>

  <!-- 主要內容卡片 -->
  <div class="main-card">
    
    <div class="header-title">
      <h1>🎂 阿君生日遊</h1>
      <p>✨ Happy Birthday & Have a Nice Trip! ✨</p>
    </div>

    <!-- 📍 行程景點快速導航 (包含原本的所有地點與 Google Maps 導航連結) -->
    <div class="section-title">📍 行程景點地圖快速導航</div>
    <div class="nav-grid">
      <a class="nav-item" href="https://maps.google.com/?q=RedDot+紅點文旅" target="_blank">🏨 RedDot 紅點文旅</a>
      <a class="nav-item" href="https://maps.google.com/?q=審計新村" target="_blank">📷 審計新村</a>
      <a class="nav-item" href="https://maps.google.com/?q=空也素麵食" target="_blank">🍜 空也素麵食</a>
      <a class="nav-item" href="https://maps.google.com/?q=Tiger+City" target="_blank">🛍️ Tiger City</a>
      <a class="nav-item" href="https://maps.google.com/?q=中華夜市" target="_blank">🌙 中華夜市</a>
      <a class="nav-item" href="https://maps.google.com/?q=國家漫畫博物館" target="_blank">📚 國家漫畫博物館</a>
      <a class="nav-item" href="https://maps.google.com/?q=屋馬燒肉" target="_blank">🥩 涮屋馬</a>
      <a class="nav-item" href="https://maps.google.com/?q=臺中國家歌劇院" target="_blank">🎭 臺中國家歌劇院</a>
    </div>

    <!-- 📍 行程打卡勾勾清單 -->
    <div class="section-title">📍 行程打卡打勾勾（進度自動儲存）</div>
    <div class="checklist-box">
      <div class="day-badge">Day 1 - 7/24 (五)</div>
      
      <label class="check-item"><input type="checkbox"> RedDot 紅點文旅 Check-in</label>
      <label class="check-item"><input type="checkbox"> 審計新村 逛街拍拍</label>
      <label class="check-item"><input type="checkbox"> 空也素麵食 享用美食</label>
      <label class="check-item"><input type="checkbox"> Tiger City 逛街看電影</label>
      <label class="check-item"><input type="checkbox"> 中華夜市 宵夜時間</label>
      <label class="check-item"><input type="checkbox"> 國家漫畫博物館 參觀</label>
      <label class="check-item"><input type="checkbox"> 涮屋馬 慶祝大餐</label>
      <label class="check-item"><input type="checkbox"> 臺中國家歌劇院 散步賞夜景</label>
    </div>

  </div>

  <!-- 櫻花特效腳本 -->
  <script>
    function createPetal() {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 8 + 8;
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = Math.random() * 3 + 4 + 's';
      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 7000);
    }
    setInterval(createPetal, 400);
  </script>

</body>
</html>
