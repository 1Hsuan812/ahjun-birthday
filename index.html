<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 阿君生日遊</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      color: #5a4636;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      padding: 20px 15px;
    }

    /* 3秒歡迎開場畫面 */
    #welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 248, 240, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease, transform 0.8s ease;
    }

    .welcome-card {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(217, 119, 127, 0.2);
      border: 3px solid #fce4e4;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 85%;
      width: 380px;
    }

    .welcome-icon {
      font-size: 3.5rem;
      margin-bottom: 15px;
      animation: floatIcon 2s ease-in-out infinite;
    }

    .welcome-card h2 {
      font-size: 1.8rem;
      color: #c85a54;
      margin-bottom: 8px;
    }

    .welcome-card p {
      font-size: 1rem;
      color: #8c7361;
    }

    #welcome-screen.hide {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-20px);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 頂部標誌列 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto 20px auto;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: bold;
      color: #d9777f;
    }

    .top-btns {
      display: flex;
      gap: 8px;
    }

    .poster-btn {
      background: #ffffff;
      color: #c85a54;
      border: 1px solid #f29f97;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .poster-btn:hover {
      background: #ffe3e3;
      transform: translateY(-1px);
    }

    .share-btn {
      background: #ffe3e3;
      color: #d9777f;
      border: 1px solid #f2b6b6;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
    }

    /* 主容器卡片 */
    .main-card {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 253, 247, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .header-title {
      text-align: center;
      margin-bottom: 25px;
    }

    .header-title h1 {
      font-size: 2.2rem;
      color: #c85a54;
      margin-bottom: 5px;
    }

    .header-title p {
      color: #8c7361;
      font-size: 0.95rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #c85a54;
      margin: 25px 0 15px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }

    .nav-item {
      background: #ffffff;
      border: 2px solid #ffd8cc;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #4a3e3d;
      font-weight: bold;
      font-size: 0.95rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      transform: translateY(-2px);
      border-color: #f29f97;
      box-shadow: 0 4px 12px rgba(200, 90, 84, 0.15);
    }

    .checklist-box {
      border: 2px dashed #f2b6a0;
      border-radius: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.6);
    }

    .day-badge {
      background: #e06d53;
      color: white;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #55433b;
      cursor: pointer;
    }

    .check-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #e06d53;
      cursor: pointer;
    }

    /* 🖼️ 方案 C：海報燈箱彈窗 (Lightbox) */
    #poster-lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    #poster-lightbox.show {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 85vh;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .lightbox-content img {
      width: 100%;
      max-height: 85vh;
      object-fit: contain;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 櫻花花瓣 */
    .petal {
      position: fixed;
      top: -10px;
      background: #ffc0cb;
      border-radius: 15px 0 15px 0;
      opacity: 0.7;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 998;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
    }

    @media (max-width: 600px) {
      .nav-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- 3秒歡迎開場畫面 -->
  <div id="welcome-screen">
    <div class="welcome-card">
      <div class="welcome-icon">🎁</div>
      <h2>阿君生日快樂！</h2>
      <p>✨ 專屬生日行程準備中... ✨</p>
    </div>
  </div>

  <!-- 頂部列 -->
  <div class="top-bar">
    <div class="brand">🌸 阿君生日遊</div>
    <div class="top-btns">
      <button class="poster-btn" onclick="openLightbox()">🖼️ 查看手繪海報</button>
      <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href); alert('已複製旅程連結！');">✨ 分享旅程</button>
    </div>
  </div>

  <!-- 主要卡片 -->
  <div class="main-card">
    
    <div class="header-title">
      <h1>🎂 阿君生日遊</h1>
      <p>✨ Happy Birthday & Have a Nice Trip! ✨</p>
    </div>

    <!-- 📍 行程景點快速導航 -->
    <div class="section-title">📍 行程景點地圖快速導航</div>
    <div class="nav-grid">
      <a class="nav-item" href="https://maps.google.com/?q=RedDot+紅點文旅" target="_blank">🏨 RedDot 紅點文旅</a>
      <a class="nav-item" href="https://maps.google.com/?q=審計新村" target="_blank">📷 審計新村</a>
      <a class="nav-item" href="https://maps.google.com/?q=空也素麵食" target="_blank">🍜 空也素麵食</a>
      <a class="nav-item" href="https://maps.google.com/?q=Tiger+City" target="_blank">🛍️ Tiger City</a>
      <a class="nav-item" href="https://maps.google.com/?q=中華夜市" target="_blank">🌙 中華夜市</a>
      <a class="nav-item" href="https://maps.google.com/?q=國家漫畫博物館" target="_blank">📚 國家漫畫博物館</a>
      <a class="nav-item" href="https://maps.google.com/?q=屋馬燒肉" target="_blank">🥩 涮屋馬</a>
      <a class="nav-item" href="https://maps.google.com/?q=臺中國家歌劇院" target="_blank">🎭 臺中國家歌劇院</a>
    </div>

    <!-- 📍 行程打卡勾勾清單 -->
    <div class="section-title">📍 行程打卡打勾勾（進度自動儲存）</div>
    <div class="checklist-box">
      <div class="day-badge">Day 1 - 7/24 (五)</div>
      
      <label class="check-item"><input type="checkbox"> RedDot 紅點文旅 Check-in</label>
      <label class="check-item"><input type="checkbox"> 審計新村 逛街拍拍</label>
      <label class="check-item"><input type="checkbox"> 空也素麵食 享用美食</label>
      <label class="check-item"><input type="checkbox"> Tiger City 逛街看電影</label>
      <label class="check-item"><input type="checkbox"> 中華夜市 宵夜時間</label>
      <label class="check-item"><input type="checkbox"> 國家漫畫博物館 參觀</label>
      <label class="check-item"><input type="checkbox"> 涮屋馬 慶祝大餐</label>
      <label class="check-item"><input type="checkbox"> 臺中國家歌劇院 散步賞夜景</label>
    </div>

  </div>

  <!-- 🖼️ 海報燈箱彈窗 -->
  <div id="poster-lightbox" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeLightbox()">✕</button>
      <img src="poster.jpg" alt="阿君生日遊手繪海報">
    </div>
  </div>

  <script>
    // 3秒開場動畫
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const welcomeScreen = document.getElementById('welcome-screen');
        if (welcomeScreen) {
          welcomeScreen.classList.add('hide');
        }
      }, 3000);
    });

    // 燈箱控制控制邏輯
    function openLightbox() {
      document.getElementById('poster-lightbox').classList.add('show');
    }

    function closeLightbox() {
      document.getElementById('poster-lightbox').classList.remove('show');
    }

    // 櫻花花瓣效果
    function createPetal() {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 8 + 8;
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = Math.random() * 3 + 4 + 's';
      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 7000);
    }
    setInterval(createPetal, 400);
  </script>

</body>
</html>
